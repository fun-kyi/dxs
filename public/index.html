<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>DxS</title>
        <link rel="icon" href="../images/dxs logo.png">
        <link rel="stylesheet" href="./css/style.css">
        <script src="./js/main.js"></script>
    </head>

    <body>
        <div class="title">
            <div class="stick">
                <div class="titleGrp">
                    <div class="logo" style="text-align: center;">
                        <img src="../images/dxs logo.png" alt="DxS" width=70em> 
                    </div>
                    <div class="flex-container2">
                        <div class="heading">
                            <i><h1 style="font-size: 300%; font-variant: small-caps;">Serenade</h1></i>
                        </div>
                        <div class="heading" style="margin-top: -3.2em; margin-bottom: 0em;">
                            <h1 id="glass-panel">소야곡</h1>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="imgContainer">
            <div class="imgStick">
                <div class="collage">
                    <img class="img" id="rockstar" src="../images/dk-rockstar.png" style="--top: 0em; --left: 0%; --width: 20%; rotate: -5deg;">
                    <img class="img" id="cloud" src="../images/sk-cloud.png" style="--top: 1em; --left: 90%; --width: 25%; rotate: 3deg;">
                    <img class="img" id="sign" src="../images/dksk-sign.png" style="--top: 13em; --left: 110%; --width: 19%; rotate: 11deg;">
                    <img class="img" id="sign2" src="../images/dksk-sign2.jpg" style="--top: 30em; --left: 0%; right: 80%; --width: 12%; rotate: 8deg;">
                    <img class="img" id="fans" src="../images/dksk-fans.jpg" style="--top: 21em; --left: 0%; right: 72%; --width: 16%; rotate: -7deg;">
                    <img class="img" id="practice" src="../images/dksk-practice.png" style="--top: 28em; --left: 70%; --width: 8%; rotate: -18deg;">
                    <img class="img" id="bow" src="../images/dksk-bow.jpg" style="--top: 35em; --left: 95%; --width: 15%;">
                    <img class="img" src="../images/sk-butterfly.png" alt="butterfly" style="position: absolute; width: 15%; top: 20%; right: 17%; rotate: -13deg;">
                    <img class="img" src="../images/sk-butterfly.png" alt="butterfly" style="position: absolute; width: 7%; top: 56%; left: 20%; transform: scaleX(-1);">
                    <img class="img" src="../images/sk-butterfly.png" alt="butterfly" style="position: absolute; width: 10%; top: 83%; right: 5%; rotate: -30deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 5%; height: 5%; top: 3%; left: 17%; rotate: 20deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 8%; height: 8%; top: 35%; right: 3%; rotate: 66deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 7%; height: 10%; top: 80%; left: 19%; rotate: -30deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 8%; height: 8%; top: 27%; left: 2%; rotate: 33deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 3%; height: 5%; top: 27%; right: 25%; rotate: -45deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 5%; height: 5%; top: 75%; right: 20%; rotate: 180deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 5%; height: 5%; top: 90%; right: 30%; rotate: 160deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 4%; height: 4%; top: 87%; left: 3%; rotate: 180deg;">
                    <img class="img" src="../images/dk-star.png" alt="star" style="position: absolute; width: 6%; height: 6%; top: 75%; left: 1%; rotate: 90deg;">
                    <img class="img" src="../images/ring-lights.png" alt="ring" style="position: absolute; width: 15%; height: 15%; top: 62%; right: 15%; rotate: 66deg;">
           </div>
            </div>
        </div>


        <div class="stage-action">
            <div class="flex-container2">
                <div class="action" style="text-align: center;">
                    <img id="actionGif" src="../images/action-1-1.png" alt="dxsinaction" style="width: 45%; z-index: 2;">
                </div>
                <div class="stage" style="text-align: center; margin-top: -3%;">
                    <img id="stage" src="../images/stage.png" alt="dxs-stage" style="width: 40%;">
                </div>
            </div>
            <div class="runBtn" style="text-align: center;">
                <button id="runBtn" type="button">hajimalago!</button>
            </div>
        </div>

        <div class="elem">
        </div>

        <script src="./js/main.js" defer></script>


    </body>
    <!-- left with wall frames: dksk with carats, dk rockstar, sk -->
     <!-- use css img {position: absolute, z-index: 1 (according to position/ layer);} background-origin:content-box-->
<!-- might want to set gif to css img style width 100% for responsive design -->
</html>
