<!DOCTYPE html>
<html lang="en-us">
    <head>

        <link rel="icon" href="../images/dxs logo.png">

        <div class="logo" style="text-align: center;">
            <img src="../images/dxs logo.png" alt="DxS" width=15%> 
        </div>
        <!-- to place into center, treat it as a division and align-->

            <i><h1 style="color: rgb(255, 255, 255); font-size: 300%; font-variant: small-caps;">Serenade</h1></i>
        </div>
        <div class="heading" style="text-align: center; padding-left: 250px; padding-right: 250px;">
            <h1 id="glass-panel" style="color: rgb(255, 255, 255); font-size: 210%;  text-shadow: 1px 1px 3px; border-radius: 50%;">소야곡</h1>
        </div>
        <div class="runbtn" style="text-align: center;">
            <button type="button">Button</button>
        </div>
        <p style="text-align: center;">Push the button to start the animation.</p>
